<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upcoming Events</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 20px;
        padding: 0;
      }

      nav {
        background: #222;
        padding: 10px;
      }

      .inner-navbar ul {
        display: flex;
        gap: 20px;
        list-style: none;
      }

      .inner-navbar a {
        color: white;
        text-decoration: none;
      }

      .inner-navbar a.active {
        color: #00bcd4;
        font-weight: bold;
      }
    </style>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="inner-navbar">
        <ul>
          <li><a href="#" class="active">Events</a></li>
          <li><a id="open-form-btn" class="active" href="#">Add Events</a></li>
          <li><a href="#">Sports</a></li>
          <li><a href="#">About Us</a></li>
        </ul>
      </div>
    </nav>

    <div id="filter-container">
      <input type="text" id="sport-filter" placeholder="Filter by sport..." />
      <button id="apply-filter">Apply</button>
      <button id="clear-filter">Clear</button>
    </div>

    <div id="events-container"></div>

    <div id="form-container" class="hidden">
      <!-- Event adding container with 7 parameters -->
      <form id="event-form">
        <button type="button" id="close-form-btn">X</button>
        <h2>Add Event</h2>

        <input type="text" id="sport" placeholder="Sport" required />
        <input type="text" id="home" placeholder="Home Team" required />
        <input type="text" id="away" placeholder="Away Team" required />

        <input type="date" id="date" required />
        <input type="time" id="time" required />

        <input type="text" id="venue" placeholder="Venue" />
        <textarea id="description" placeholder="Description"></textarea>

        <button type="submit">Submit</button>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
